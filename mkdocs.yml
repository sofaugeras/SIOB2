site_name: Saint Sauveur BTS SIO SLAM
site_url: https://github.com/sofaugeras/SIOB2
repo_url: https://github.com/sofaugeras/SIOB2
repo_name: 'Cours BTS SIO Bloc SLAM Saint Sauveur'
edit_uri: edit/main/docs/
site_description: Site de Cours BTS SIO SLAM
site_author: "Sophie FAUGERAS" 
docs_dir: docs
   
theme:
  name: material
  
  custom_dir: docs/overrides #
  font: false
  language: fr
  favicon: xtra/favTNSI.png
  icon:
    logo: material/code-greater-than
    repo : fontawesome/brands/github
    admonition:
      note: fontawesome/solid/pen-to-square

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - toc.integrate
    - header.autohide
    - content.code.annotate 
    - content.code.copy

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Mode sombre

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Mode clair


markdown_extensions:
  - meta
  - abbr
  - admonition
  - def_list
  - attr_list
  - footnotes
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.highlight:           # Coloration syntaxique du code
        linenums: None
        auto_title: true
        pygments_lang_class: true
        auto_title_map:
            "Text Only": "📋 Texte"
            "Python": "🐍 Python"
            "Python Console Session": "🐍 Python"
            "JavaScript": "🍵 JavaScript"
            "SQL": "🐬 SQL"
            "PHP": "🐘 PHP"
            "Prompt": "💻 Console"
            "Bash": "💻 Console"
            "E-mail": "📥 Entrée"
            "Text Output": "📤 Sortie"
  - pymdownx.tasklist:
        custom_checkbox: false
        clickable_checkbox: true
  - pymdownx.inlinehilite
  - pymdownx.superfences          # Imbrication de blocs
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: ⚓︎
      toc_depth: 3
  
plugins:
  - search
  - awesome-pages:
      collapse_single_pages: false
extra:
  analytics: 
    provider: google
    property: G-NXDLLVVQEB

  social:
    - icon: fontawesome/solid/paper-plane
      link: mailto:sophie.faugeras@ac-rennes.fr
      name: Écrire à l'auteur

    - icon : fontawesome/brands/linkedin
      link : https://www.linkedin.com/in/sophie-faugeras-77b4b6124/
      name : profil Linkedln

    - icon : fontawesome/brands/twitter
      link : https://twitter.com/sfaugeras_info
      name : Mon twitter

    - icon: fontawesome/brands/github
      link: https://github.com/sofaugeras/SIOB2
      name: Dépôt git

    - icon: fontawesome/solid/school
      link: https://www.btssio-redon.fr/
      name: BTS SIO - Lycée Saint Sauveur - Redon

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.7.2/highlight.min.js
  - https://cdn.jsdelivr.net/gh/rod2ik/cdn@main/mkdocs/javascripts/mkdocs-graphviz.js
  - https://unpkg.com/mermaid@8.9.2/dist/mermaid.min.js
  - javascript/mermaid.js
  - javascript/mathjax.js
  - javascript/interpreter.js

extra_css:
  - stylesheets/extra.css

copyright:  CC BY-SA / S.Faugeras
