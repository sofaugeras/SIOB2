  <ellipse cx="360" cy="665" rx="100" ry="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="360" y="665" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Consulter les critiques</text>

  <text x="530" y="404" font-size="10" fill="#B4B2A9">TP2</text>
  <text x="530" y="457" font-size="10" fill="#B4B2A9">TP2</text>
  <text x="530" y="510" font-size="10" fill="#B4B2A9">TP3</text>
  <text x="530" y="563" font-size="10" fill="#B4B2A9">TP4/5</text>
  <text x="530" y="616" font-size="10" fill="#B4B2A9">TP4</text>
  <text x="530" y="669" font-size="10" fill="#B4B2A9">TP4</text>

