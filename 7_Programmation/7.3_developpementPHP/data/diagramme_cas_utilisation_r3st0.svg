  <ellipse cx="360" cy="400" rx="65" ry="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="360" y="400" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Se connecter</text>

  <ellipse cx="360" cy="453" rx="72" ry="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
