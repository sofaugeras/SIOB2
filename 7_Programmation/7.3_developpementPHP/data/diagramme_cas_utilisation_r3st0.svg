  <!-- ACTEUR : Utilisateur authentifié -->
  <circle cx="75" cy="532" r="13" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="75" y1="545" x2="75" y2="575" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="57" y1="559" x2="93" y2="559" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="75" y1="575" x2="60" y2="597" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="75" y1="575" x2="90" y2="597" stroke="#2C2C2A" stroke-width="1.5"/>
  <text x="75" y="614" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">Utilisateur</text>
  <text x="75" y="629" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">authentifié</text>

  <!-- GÉNÉRALISATION : flèche enfant → parent (triangle ouvert vers Visiteur) -->
  <line x1="75" y1="519" x2="75" y2="185" stroke="#2C2C2A" stroke-width="1.2"/>
  <path d="M 68,185 L 75,173 L 82,185 Z" fill="none" stroke="#2C2C2A" stroke-width="1.2"/>
  <text x="90" y="362" font-size="10" fill="#5F5E5A" font-style="italic">hérite de</text>

  <!-- CONNEXIONS Visiteur → cas d'utilisation -->
  <line x1="88" y1="95" x2="270" y2="95" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="103" x2="248" y2="152" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="112" x2="255" y2="210" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="120" x2="280" y2="268" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="128" x2="305" y2="326" stroke="#888780" stroke-width="0.8"/>

  <!-- CONNEXIONS Utilisateur authentifié → cas d'utilisation -->
  <line x1="88" y1="520" x2="295" y2="402" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="530" x2="288" y2="453" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="540" x2="270" y2="506" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="549" x2="270" y2="557" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="558" x2="278" y2="610" stroke="#888780" stroke-width="0.8"/>
  <line x1="88" y1="566" x2="260" y2="663" stroke="#888780" stroke-width="0.8"/>

  <!-- LÉGENDE -->
  <ellipse cx="180" cy="696" rx="12" ry="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="196" y="700" font-size="11" fill="#2C2C2A">Visiteur</text>
  <ellipse cx="282" cy="696" rx="12" ry="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="298" y="700" font-size="11" fill="#2C2C2A">Utilisateur authentifié</text>
</svg>
