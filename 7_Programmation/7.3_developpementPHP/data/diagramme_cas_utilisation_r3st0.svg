<svg width="100%" viewBox="0 0 680 710" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Diagramme de cas d'utilisation — r3st0.fr</title>
  <desc>11 cas d'utilisation couverts dans les 5 TP, répartis entre Visiteur et Utilisateur authentifié.</desc>

  <!-- Frontière système -->
  <rect x="155" y="28" width="400" height="660" rx="6" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="6 3"/>
