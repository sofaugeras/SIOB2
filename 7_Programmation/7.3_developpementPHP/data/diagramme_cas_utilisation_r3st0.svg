  <!-- Séparateur Visiteur / Authentifié -->
  <line x1="175" y1="365" x2="535" y2="365" stroke="#C9C7BE" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- CAS D'UTILISATION — Visiteur (teal) -->
  <ellipse cx="360" cy="96" rx="90" ry="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="360" y="96" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Lister les restaurants</text>

  <ellipse cx="360" cy="154" rx="112" ry="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
