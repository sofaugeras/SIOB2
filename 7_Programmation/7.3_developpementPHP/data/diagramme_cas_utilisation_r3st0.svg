  <ellipse cx="360" cy="559" rx="90" ry="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="360" y="559" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Aimer un restaurant</text>

  <ellipse cx="360" cy="612" rx="82" ry="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
