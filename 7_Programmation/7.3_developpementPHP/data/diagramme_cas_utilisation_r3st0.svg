  <ellipse cx="360" cy="270" rx="80" ry="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="360" y="270" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Consulter les CGU</text>

  <ellipse cx="360" cy="328" rx="55" ry="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="360" y="328" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">S'inscrire</text>

  <!-- Étiquettes TP (référence) -->
  <text x="530" y="100" font-size="10" fill="#B4B2A9">TP1</text>
  <text x="530" y="158" font-size="10" fill="#B4B2A9">TP1</text>
  <text x="530" y="216" font-size="10" fill="#B4B2A9">TP2</text>
  <text x="530" y="274" font-size="10" fill="#B4B2A9">TP5</text>
  <text x="530" y="332" font-size="10" fill="#B4B2A9">TP5</text>

