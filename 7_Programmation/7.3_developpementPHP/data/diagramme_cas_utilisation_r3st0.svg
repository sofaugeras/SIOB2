  <circle cx="75" cy="90" r="13" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="75" y1="103" x2="75" y2="133" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="57" y1="117" x2="93" y2="117" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="75" y1="133" x2="60" y2="155" stroke="#2C2C2A" stroke-width="1.5"/>
