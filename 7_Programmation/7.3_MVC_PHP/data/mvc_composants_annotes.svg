<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Les 3 composants MVC annotés — fonctionnalité liste des restaurants</title>
  <desc>Exemple concret avec listeRestos.php, getRestos() et vueListeRestos.php.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Titre -->
  <text x="340" y="20" text-anchor="middle" font-size="12" fill="#5F5E5A">Fonctionnalité : afficher la liste des restaurants</text>

  <!-- Modèle -->
  <rect x="30" y="50" width="175" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="117" y="72" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">Modèle</text>
  <text x="117" y="92" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">bd.resto.inc.php</text>
  <text x="117" y="112" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">getRestos()</text>

  <!-- Contrôleur -->
  <rect x="245" y="50" width="190" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="72" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">Contrôleur</text>
  <text x="340" y="92" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">listeRestos.php</text>
  <text x="340" y="112" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">$listeRestos = getRestos()</text>

  <!-- Vue -->
  <rect x="475" y="50" width="175" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="562" y="72" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#712B13">Vue</text>
  <text x="562" y="92" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">vueListeRestos.php</text>
  <text x="562" y="112" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">foreach $listeRestos</text>

  <!-- Flèche Contrôleur → Modèle (appel) -->
  <line x1="245" y1="78" x2="205" y2="78" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="225" y="72" text-anchor="middle" font-size="11" fill="#0F6E56">appel</text>

  <!-- Flèche Modèle → Contrôleur (retour tableau) -->
  <line x1="205" y1="108" x2="245" y2="108" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="225" y="124" text-anchor="middle" font-size="11" fill="#0F6E56" font-style="italic">tableau</text>

  <!-- Flèche Contrôleur → Vue (include) -->
  <line x1="435" y1="88" x2="475" y2="88" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="455" y="82" text-anchor="middle" font-size="11" fill="#993C1D">include</text>

  <!-- URL requête GET -->
  <rect x="195" y="155" width="290" height="28" rx="5" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="340" y="173" text-anchor="middle" font-size="11" fill="#5F5E5A" font-style="italic">index.php?action=liste</text>
  <text x="340" y="205" text-anchor="middle" font-size="11" fill="#888780">Requête GET du navigateur</text>

  <!-- Flèche requête → Contrôleur -->
  <line x1="340" y1="155" x2="340" y2="130" stroke="#888780" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- Flèche Vue → HTML navigateur -->
  <line x1="562" y1="130" x2="562" y2="185" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <rect x="472" y="185" width="180" height="28" rx="5" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="562" y="203" text-anchor="middle" font-size="11" fill="#712B13">HTML → navigateur</text>
</svg>
