<svg width="100%" viewBox="0 0 680 740" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Flux complet d'une requête MVC — r3st0.fr</title>
  <desc>De la requête GET du navigateur jusqu'au HTML final renvoyé, en passant par index.php, le contrôleur principal, le contrôleur detailResto, le modèle et la vue.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Navigateur (haut) -->
  <rect x="200" y="20" width="280" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Navigateur</text>
  <text x="340" y="59" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">GET /?action=detail&amp;idR=3</text>

  <!-- Flèche 1 -->
  <line x1="340" y1="72" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- index.php -->
  <rect x="220" y="110" width="240" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="130" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">index.php</text>
  <text x="340" y="149" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">$action = "detail"</text>

  <!-- Flèche 2 -->
  <line x1="340" y1="162" x2="340" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Contrôleur principal -->
  <rect x="180" y="200" width="320" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="220" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">controleurPrincipal("detail")</text>
  <text x="340" y="239" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">retourne "detailResto.php"</text>

  <!-- Flèche 3 -->
  <line x1="340" y1="252" x2="340" y2="288" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Contrôleur detailResto -->
  <rect x="160" y="290" width="360" height="84" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="313" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">controleur/detailResto.php</text>
  <text x="340" y="333" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">$idR = $_GET['idR']  ← données utilisateur</text>
  <text x="340" y="350" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">$unResto = getRestoByIdR($idR)  ← modèle</text>
  <text x="340" y="366" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">$lesPhotos = getPhotosByIdR(...)  ← modèle</text>

  <!-- Flèche 4 : contrôleur → modèle -->
  <line x1="340" y1="374" x2="340" y2="410" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Modèle -->
  <rect x="180" y="412" width="320" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="432" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">modele/bd.resto.inc.php</text>
  <text x="340" y="451" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">SELECT * FROM resto WHERE idR = 3</text>

  <!-- Flèche 5 : modèle → BD -->
  <line x1="340" y1="464" x2="340" y2="500" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Base de données -->
  <rect x="210" y="502" width="260" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="524" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Base de données MySQL</text>

  <!-- Flèche 6 : retour résultat (tirets, côté droit) -->
  <path d="M524 524 Q580 524 580 422 Q580 330 520 330" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="600" y="430" text-anchor="middle" font-size="11" fill="#0F6E56" font-style="italic">résultat</text>

  <!-- Flèche 7 : contrôleur → vue -->
  <line x1="340" y1="546" x2="340" y2="582" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vue -->
  <rect x="160" y="584" width="360" height="68" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="606" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">vue/vueDetailResto.php</text>
  <text x="340" y="624" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">include entete.html.php</text>
  <text x="340" y="641" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">include pied.html.php</text>

  <!-- Flèche 8 : vue → navigateur -->
  <line x1="340" y1="652" x2="340" y2="688" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Navigateur (bas) -->
  <rect x="200" y="690" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="708" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Navigateur</text>
  <text x="340" y="725" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">HTML final envoyé au client</text>

  <!-- Légende -->
  <rect x="30" y="412" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="46" y="423" font-size="11" fill="#5F5E5A">Contrôleur</text>
  <rect x="30" y="432" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="46" y="443" font-size="11" fill="#5F5E5A">Modèle</text>
  <rect x="30" y="452" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="46" y="463" font-size="11" fill="#5F5E5A">Vue</text>
</svg>
