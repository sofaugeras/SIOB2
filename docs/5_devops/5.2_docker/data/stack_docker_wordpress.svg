<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Navigateur étudiant -->
  <g style="fill:none">
    <rect x="20" y="170" width="130" height="56" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
    <text x="85" y="191" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Navigateur</text>
    <text x="85" y="209" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">PC étudiant</text>
  </g>

  <!-- Flèche navigateur → Nginx -->
  <line x1="150" y1="198" x2="196" y2="198" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>
  <text x="173" y="188" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3d3d3a">HTTP :80</text>

  <!-- srv-debian (enveloppe principale) -->
  <rect x="200" y="40" width="460" height="360" rx="14" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="430" y="66" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">srv-debian</text>
  <text x="430" y="84" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Debian 12 bare-metal · Docker Engine</text>

  <!-- Nginx (bare-metal, hors Docker) -->
  <rect x="220" y="100" width="420" height="60" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
  <text x="430" y="124" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A">Nginx</text>
  <text x="430" y="142" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3B6D11">reverse proxy bare-metal · port :80 → :808X selon prenom.srv-debian.local</text>

  <!-- Flèche Nginx → réseau Docker -->
  <line x1="430" y1="160" x2="430" y2="186" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>
  <text x="460" y="176" text-anchor="start" font-family="sans-serif" font-size="11" fill="#3d3d3a">:808X</text>

  <!-- Réseau Docker wp_network_PRENOM -->
  <rect x="220" y="190" width="420" height="180" rx="10" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="430" y="213" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">réseau Docker  wp_network_prenom</text>

  <!-- Conteneur WordPress -->
  <rect x="240" y="228" width="160" height="120" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="320" y="254" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">WordPress</text>
  <text x="320" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">wordpress:latest</text>
  <text x="320" y="290" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">PHP · Apache</text>
  <text x="320" y="318" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">port :808X → :80</text>

  <!-- Conteneur MySQL -->
  <rect x="440" y="228" width="160" height="120" rx="8" stroke-width="0.5" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="520" y="254" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">MySQL</text>
  <text x="520" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#854F0B">mysql:8.0</text>
  <text x="520" y="290" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#854F0B">port interne :3306</text>
  <text x="520" y="318" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#854F0B">vol: mysql_data</text>

  <!-- Flèche WP → MySQL -->
  <line x1="400" y1="288" x2="438" y2="288" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>

  <!-- Volumes en bas -->
  <rect x="240" y="370" width="130" height="36" rx="6" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text x="305" y="388" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">vol: wp_content</text>
  <line x1="320" y1="348" x2="305" y2="368" stroke-dasharray="4 3" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>

  <rect x="440" y="370" width="130" height="36" rx="6" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text x="505" y="388" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">vol: mysql_data</text>
  <line x1="520" y1="348" x2="505" y2="368" stroke-dasharray="4 3" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>
</svg>
