# =============================================================================
# docker-compose.yml — Stack production Todo Laravel
# Services : app (php-fpm) + nginx + mysql
# Déploiement : srv-debian, via pipeline CI/CD GitHub Actions
# =============================================================================
services:
  # ── Application Laravel (php-fpm) ─────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE:-votre-dockerhub/todo-laravel}:${IMAGE_TAG:-latest}
    container_name: todo-app
    restart: unless-stopped
    environment:
      APP_NAME: "Todo BTS"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://todo.srv-debian.local}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-todo_prod}
      DB_USERNAME: ${DB_USERNAME:-todo}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
    volumes:
      - todo_storage:/var/www/html/storage
      - /opt/todo-laravel/.env:/var/www/html/.env:ro
      - app_public:/var/www/html/public
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - todo-net

  # ── Nginx (reverse proxy vers php-fpm) ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - todo-net

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: todo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-todo_prod}
      MYSQL_USER: ${DB_USERNAME:-todo}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - todo_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - todo-net

# ── Volumes nommés (données persistantes entre redéploiements) ───────────────
volumes:
  todo_mysql:
    driver: local
  todo_storage:
    driver: local
  app_public:
    driver: local

# ── Réseau interne (les conteneurs se voient par leur nom de service) ─────────
networks:
  todo-net:
    driver: bridge
