# =============================================================================
# .github/workflows/ci-cd.yml — Pipeline CI/CD complet
#
# SECRETS GitHub à configurer dans Settings > Secrets and variables > Actions :
#   DOCKERHUB_USERNAME   → votre identifiant Docker Hub
#   DOCKERHUB_TOKEN      → token Docker Hub (pas le mot de passe)
#   DOCKERHUB_IMAGE      → votre-user/todo-laravel
#   DEPLOY_PATH          → /opt/todo-prenom
# =============================================================================

name: CI/CD — Todo Laravel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 : CI — Tests, lint, build
  # ─────────────────────────────────────────────────────────────────────────
  build-test:
    name: "CI — Build & Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: todo_test
          MYSQL_USER: laravel_test
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, curl, dom, fileinfo, gd, pdo_mysql
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ hashFiles('**/composer.lock') }}

      - name: Install Composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Build front (Vite)
        run: npm run build --if-present

      - name: Prepare CI .env and key
        run: cp .env.ci .env && php artisan key:generate

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Migrate database
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: todo_test
          DB_USERNAME: laravel_test
          DB_PASSWORD: secret
        run: php artisan migrate --no-interaction --force

      - name: Lint PHP (Pint)
        run: |
          if [ ! -f vendor/bin/pint ]; then composer require --dev laravel/pint; fi
          vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: |
          if [ ! -f vendor/bin/phpstan ]; then
            composer require --dev larastan/larastan
          fi
          vendor/bin/phpstan analyse --memory-limit=1G --no-progress
        continue-on-error: true

      - name: Run tests
        env:
          XDEBUG_MODE: coverage
        run: php artisan test --coverage-clover=coverage.xml || true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 : CD — Build image Docker, push, déploiement self-hosted runner
  # Déclenché UNIQUEMENT sur push main ET si CI est passé
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: "CD — Docker build & Deploy"
    runs-on: self-hosted
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy
        run: |
          cp ${{ secrets.DEPLOY_PATH }}/.env.prod ${{ secrets.DEPLOY_PATH }}/.env
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} down --remove-orphans || true
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} pull app
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} up -d --force-recreate
          sleep 5
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} exec -T app php artisan config:cache
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} exec -T app php artisan route:cache
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} exec -T app php artisan view:cache
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} exec -T app php artisan migrate:fresh --seed --force
          docker compose --project-directory ${{ secrets.DEPLOY_PATH }} exec -T app php artisan cache:clear

      - name: Deployment summary
        run: |
          echo "## Déploiement réussi ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Image** : \`${{ secrets.DOCKERHUB_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
