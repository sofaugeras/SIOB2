<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg"
     font-family="Arial, Helvetica, sans-serif">
  <title>Schéma du patron de conception MVC</title>
  <desc>Le navigateur envoie une requête HTTP au contrôleur, qui coordonne le modèle (accès aux données) et la vue (affichage HTML).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Navigateur -->
  <a href="https://fr.wikipedia.org/wiki/Navigateur_web" target="_blank">
    <rect x="140" y="30" width="400" height="62" rx="10"
          fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="340" y="55" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Navigateur</text>
    <text x="340" y="76" text-anchor="middle" font-size="12" fill="#5F5E5A">Requête HTTP GET / POST</text>
  </a>

  <!-- Flèche navigateur → contrôleur -->
  <line x1="340" y1="92" x2="340" y2="148"
        stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Contrôleur -->
  <a href="https://fr.wikipedia.org/wiki/Mod%C3%A8le-vue-contr%C3%B4leur" target="_blank">
    <rect x="200" y="150" width="280" height="70" rx="10"
          fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="340" y="179" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Contrôleur</text>
    <text x="340" y="201" text-anchor="middle" font-size="12" fill="#534AB7">Logique applicative · coordination</text>
  </a>

  <!-- Flèche contrôleur → modèle -->
  <line x1="270" y1="220" x2="190" y2="295"
        stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Flèche contrôleur → vue -->
  <line x1="410" y1="220" x2="490" y2="295"
        stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Modèle -->
  <a href="https://fr.wikipedia.org/wiki/Mod%C3%A8le-vue-contr%C3%B4leur#Mod%C3%A8le" target="_blank">
    <rect x="60" y="298" width="240" height="70" rx="10"
          fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="180" y="327" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Modèle</text>
    <text x="180" y="349" text-anchor="middle" font-size="12" fill="#0F6E56">Accès données · fonctions BD (PDO)</text>
  </a>

  <!-- Vue -->
  <a href="https://fr.wikipedia.org/wiki/Mod%C3%A8le-vue-contr%C3%B4leur#Vue" target="_blank">
    <rect x="380" y="298" width="240" height="70" rx="10"
          fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="500" y="327" text-anchor="middle" font-size="14" font-weight="600" fill="#712B13">Vue</text>
    <text x="500" y="349" text-anchor="middle" font-size="12" fill="#993C1D">Affichage HTML · rendu visuel</text>
  </a>
</svg>
